name: Nyuway Skill Security Scan

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  nyuway-skill-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install nyuwayskillscanner
        run: |
          python -m pip install --upgrade pip
          pip install nyuwayskillscanner

      - name: Scan skills and write SARIF
        run: |
          nyuwayskillscanner scan ./skills \
            --recursive \
            --static-only \
            --offline \
            --policy-pack marketplace \
            --fail-on high \
            --output sarif > nyuwayskillscanner.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: nyuwayskillscanner.sarif
